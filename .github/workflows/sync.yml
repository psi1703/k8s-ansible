name: Sync k8s-ansible repo to server

run-name: "sync/deploy @ ${{ github.ref_name }}"

permissions:
  contents: read

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      deploy_mode:
        description: "Deployment mode override"
        required: true
        default: "auto"
        type: choice
        options:
          - auto
          - none
          - manifests
          - app
          - monitor
          - full

concurrency:
  group: sync-k8s-ansible-to-server-${{ github.ref }}
  cancel-in-progress: true

env:
  DEPLOY_REPO_DIR: /opt/k8s-ansible

jobs:
  sync:
    name: Sync repository and deploy changed components
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 60

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
          clean: true
          persist-credentials: false

      - name: Detect deployment mode
        id: detect
        run: |
          set -Eeuo pipefail

          MANUAL_MODE="${{ github.event.inputs.deploy_mode || 'auto' }}"
          BEFORE="${{ github.event.before || '' }}"
          AFTER="${GITHUB_SHA}"

          echo "Manual deploy mode: ${MANUAL_MODE}"
          echo "Before: ${BEFORE:-none}"
          echo "After: ${AFTER}"

          if [ "${MANUAL_MODE}" != "auto" ]; then
            echo "deploy_mode=${MANUAL_MODE}" >> "$GITHUB_OUTPUT"
            echo "reason=manual override: ${MANUAL_MODE}" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "${BEFORE}" ] || [ "${BEFORE}" = "0000000000000000000000000000000000000000" ]; then
            CHANGED_FILES="$(git diff-tree --no-commit-id --name-only -r "${AFTER}" || true)"
          else
            CHANGED_FILES="$(git diff --name-only "${BEFORE}" "${AFTER}" || true)"
          fi

          echo "Changed files:"
          if [ -n "${CHANGED_FILES}" ]; then
            printf '%s\n' "${CHANGED_FILES}"
          else
            echo "(none detected)"
          fi

          FULL_CHANGED=0
          APP_CHANGED=0
          MONITOR_CHANGED=0
          MANIFESTS_CHANGED=0
          OBSERVABILITY_CHANGED=0

          if printf '%s\n' "${CHANGED_FILES}" | grep -Eq '^requirements\.txt$'; then
            FULL_CHANGED=1
          fi

          if printf '%s\n' "${CHANGED_FILES}" | grep -Eq '^(otp_relay/|main\.py$|frontend/|docs/help/|scripts/build_help_docs\.py$|k8s/Dockerfile$|package\.json$|package-lock\.json$)'; then
            APP_CHANGED=1
          fi

          if printf '%s\n' "${CHANGED_FILES}" | grep -Eq '^(otp_monitor/|monitor\.py$|k8s/Dockerfile\.monitor$)'; then
            MONITOR_CHANGED=1
          fi

          if printf '%s\n' "${CHANGED_FILES}" | grep -Eq '^(k8s/manifests/|scripts/lib/(manifests|tls|metallb|apply-deploy|images|build-stage|deploy-mode)\.sh$|install-otp-relay-k8s\.sh$)'; then
            MANIFESTS_CHANGED=1
          fi

          if printf '%s\n' "${CHANGED_FILES}" | grep -Eq '^(k8s/observability/|scripts/build_grafana_dashboard_configmap\.py$)'; then
            OBSERVABILITY_CHANGED=1
          fi

          DEPLOY_MODE="none"
          REASON="sync-only change"

          if [ "${FULL_CHANGED}" = "1" ]; then
            DEPLOY_MODE="full"
            REASON="requirements.txt changed"
          elif [ "${APP_CHANGED}" = "1" ] && [ "${MONITOR_CHANGED}" = "1" ]; then
            DEPLOY_MODE="full"
            REASON="app and monitor files changed"
          elif [ "${APP_CHANGED}" = "1" ]; then
            DEPLOY_MODE="app"
            REASON="app/backend/frontend files changed"
          elif [ "${MONITOR_CHANGED}" = "1" ]; then
            DEPLOY_MODE="monitor"
            REASON="monitor files changed"
          elif [ "${MANIFESTS_CHANGED}" = "1" ] || [ "${OBSERVABILITY_CHANGED}" = "1" ]; then
            DEPLOY_MODE="manifests"
            REASON="Kubernetes manifest or observability files changed"
          fi

          echo "Selected deploy mode: ${DEPLOY_MODE}"
          echo "Reason: ${REASON}"

          echo "deploy_mode=${DEPLOY_MODE}" >> "$GITHUB_OUTPUT"
          echo "reason=${REASON}" >> "$GITHUB_OUTPUT"

      - name: Sync checkout to active server repo
        run: |
          set -Eeuo pipefail

          echo "Runner name: ${RUNNER_NAME:-unknown}"
          echo "Runner OS: ${RUNNER_OS:-unknown}"
          echo "Runner arch: ${RUNNER_ARCH:-unknown}"
          echo "Workspace: ${GITHUB_WORKSPACE}"
          echo "Target: ${DEPLOY_REPO_DIR}"
          echo "Commit: ${GITHUB_SHA}"
          echo "Detected deploy mode: ${{ steps.detect.outputs.deploy_mode }}"
          echo "Detection reason: ${{ steps.detect.outputs.reason }}"

          if ! command -v rsync >/dev/null 2>&1; then
            echo "rsync is missing; installing it now."
            sudo apt-get update
            sudo apt-get install -y rsync
          fi

          sudo mkdir -p "${DEPLOY_REPO_DIR}"
          sudo chown -R "$(id -un):$(id -gn)" "${DEPLOY_REPO_DIR}"

          rsync -a --delete \
            --exclude '.env' \
            --exclude 'automation/ansible/inventory.generated.ini' \
            --exclude 'automation/libvirt/build/' \
            "${GITHUB_WORKSPACE}/" \
            "${DEPLOY_REPO_DIR}/"

          chmod +x "${DEPLOY_REPO_DIR}"/automation/libvirt/*.sh 2>/dev/null || true
          chmod +x "${DEPLOY_REPO_DIR}"/automation/ansible/*.sh 2>/dev/null || true
          chmod +x "${DEPLOY_REPO_DIR}/install-otp-relay-k8s.sh" 2>/dev/null || true

          echo
          echo "Synced repo status:"
          cd "${DEPLOY_REPO_DIR}"
          git status --short || true
          git log --oneline -1 || true

          echo
          echo "Preserved server-local files:"
          [ -f "${DEPLOY_REPO_DIR}/.env" ] && echo "- .env exists" || echo "- .env not present yet"
          [ -f "${DEPLOY_REPO_DIR}/automation/ansible/inventory.generated.ini" ] && echo "- inventory.generated.ini exists" || echo "- inventory.generated.ini not present yet"
          [ -d "${DEPLOY_REPO_DIR}/automation/libvirt/build" ] && echo "- automation/libvirt/build exists" || echo "- automation/libvirt/build not present yet"

          echo
          echo "Provisioner files:"
          find "${DEPLOY_REPO_DIR}/automation/libvirt" -maxdepth 1 -type f -print 2>/dev/null | sort || true

          echo
          echo "Ansible helper scripts:"
          find "${DEPLOY_REPO_DIR}/automation/ansible" -maxdepth 1 -type f -name '*.sh' -print 2>/dev/null | sort || true

          echo
          echo "Sync complete."

      - name: Deploy changed components
        if: steps.detect.outputs.deploy_mode != 'none'
        run: |
          set -Eeuo pipefail

          DEPLOY_MODE="${{ steps.detect.outputs.deploy_mode }}"

          echo "Starting deployment after sync"
          echo "Deploy mode: ${DEPLOY_MODE}"
          echo "Reason: ${{ steps.detect.outputs.reason }}"
          echo "Repo: ${DEPLOY_REPO_DIR}"

          cd "${DEPLOY_REPO_DIR}"

          if [ ! -f ".env" ]; then
            echo "[ERROR] ${DEPLOY_REPO_DIR}/.env is missing. Refusing noninteractive deployment."
            exit 1
          fi

          if [ ! -f "install-otp-relay-k8s.sh" ]; then
            echo "[ERROR] install-otp-relay-k8s.sh is missing."
            exit 1
          fi

          sudo env \
            ENV_FILE="${DEPLOY_REPO_DIR}/.env" \
            NONINTERACTIVE=1 \
            SKIP_REPO_SYNC=1 \
            GIT_CLEAN=0 \
            INSTALLER_DEPLOY_MODE="${DEPLOY_MODE}" \
            IMAGE_DISTRIBUTION_PORT="${IMAGE_DISTRIBUTION_PORT:-18080}" \
            bash install-otp-relay-k8s.sh

          echo "Deployment completed for DEPLOY_MODE=${DEPLOY_MODE}"

      - name: Skip deployment
        if: steps.detect.outputs.deploy_mode == 'none'
        run: |
          set -Eeuo pipefail
          echo "No deployable app, monitor, manifest, or requirements change detected."
          echo "Repository sync completed only."
