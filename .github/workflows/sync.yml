name: Sync k8s-ansible DEVtoPROD repo to dev server

run-name: "sync DEVtoPROD @ ${{ github.ref_name }}"

permissions:
  contents: read

on:
  push:
    branches:
      - k8s-ansible-DEVtoPROD
  workflow_dispatch:

concurrency:
  group: sync-k8s-ansible-devtoprod-to-dev-server-${{ github.ref }}
  cancel-in-progress: true

env:
  SYNC_BRANCH: k8s-ansible-DEVtoPROD
  SYNC_REPO_DIR: /opt/k8s-ansible-DEVtoPROD

jobs:
  sync:
    name: Sync DEVtoPROD repository to dev/build server only
    runs-on: [self-hosted, Linux, X64]
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Refuse wrong branch
        run: |
          set -Eeuo pipefail

          echo "Expected branch: ${SYNC_BRANCH}"
          echo "Current branch:  ${GITHUB_REF_NAME}"
          echo "Git ref:         ${GITHUB_REF}"
          echo "Target dir:      ${SYNC_REPO_DIR}"

          if [ "${GITHUB_REF_NAME}" != "${SYNC_BRANCH}" ]; then
            echo "[ERROR] Refusing to sync from branch '${GITHUB_REF_NAME}'."
            echo "[ERROR] This workflow is only allowed from '${SYNC_BRANCH}'."
            exit 1
          fi

          case "${SYNC_REPO_DIR}" in
            *DEVtoPROD*)
              echo "Target directory safety check passed."
              ;;
            *)
              echo "[ERROR] SYNC_REPO_DIR does not look like a DEVtoPROD path: ${SYNC_REPO_DIR}"
              exit 1
              ;;
          esac

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          ref: ${{ env.SYNC_BRANCH }}
          fetch-depth: 1
          clean: true
          persist-credentials: false

      - name: Sync checkout to dev/build server repo
        run: |
          set -Eeuo pipefail

          echo "Runner name: ${RUNNER_NAME:-unknown}"
          echo "Runner OS: ${RUNNER_OS:-unknown}"
          echo "Runner arch: ${RUNNER_ARCH:-unknown}"
          echo "Workspace: ${GITHUB_WORKSPACE}"
          echo "Target: ${SYNC_REPO_DIR}"
          echo "Branch: ${GITHUB_REF_NAME}"
          echo "Commit: ${GITHUB_SHA}"

          if [ "${GITHUB_REF_NAME}" != "${SYNC_BRANCH}" ]; then
            echo "[ERROR] Branch changed unexpectedly. Refusing sync."
            exit 1
          fi

          if ! command -v rsync >/dev/null 2>&1; then
            echo "rsync is missing; installing it now."
            sudo apt-get update
            sudo apt-get install -y rsync
          fi

          sudo mkdir -p "${SYNC_REPO_DIR}"
          sudo chown -R "$(id -un):$(id -gn)" "${SYNC_REPO_DIR}"

          rsync -a --delete \
            --exclude '.git/' \
            --exclude '.env' \
            --exclude '.env.*' \
            --exclude '.installer-venv/' \
            --exclude '.pytest_cache/' \
            --exclude '.mypy_cache/' \
            --exclude '.ruff_cache/' \
            --exclude '__pycache__/' \
            --exclude 'node_modules/' \
            --exclude 'venv/' \
            --exclude '.venv/' \
            --exclude 'release/' \
            --exclude 'dist/' \
            --exclude 'automation/ansible/inventory.generated.ini' \
            --exclude 'automation/libvirt/build/' \
            --exclude '*.log' \
            --exclude '*.tar' \
            --exclude '*.tar.gz' \
            --exclude '*.tgz' \
            --exclude '*.zip' \
            --exclude 'users.xlsx' \
            --exclude 'admin_auth.json' \
            --exclude 'admin_config.json' \
            --exclude 'wizard_progress.json' \
            --exclude 'audit.log' \
            "${GITHUB_WORKSPACE}/" \
            "${SYNC_REPO_DIR}/"

          echo
          echo "Synced repo status:"
          cd "${SYNC_REPO_DIR}"

          if git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            git status --short || true
            git branch --show-current || true
            git log --oneline -1 || true
          else
            echo "Synced directory is not a git work tree because .git is intentionally excluded."
            echo "Current synced commit: ${GITHUB_SHA}"
          fi

          echo
          echo "Preserved dev-server-local files:"
          [ -f "${SYNC_REPO_DIR}/.env" ] && echo "- .env exists" || echo "- .env not present yet"
          [ -f "${SYNC_REPO_DIR}/automation/ansible/inventory.generated.ini" ] && echo "- inventory.generated.ini exists" || echo "- inventory.generated.ini not present yet"
          [ -d "${SYNC_REPO_DIR}/automation/libvirt/build" ] && echo "- automation/libvirt/build exists" || echo "- automation/libvirt/build not present yet"
          [ -d "${SYNC_REPO_DIR}/release" ] && echo "- release directory exists" || echo "- release directory not present yet"
          [ -d "${SYNC_REPO_DIR}/dist" ] && echo "- dist directory exists" || echo "- dist directory not present yet"

          echo
          echo "DEVtoPROD safety values from dev-server-local .env, if present:"
          grep -nE '^(REPO_REF|INSTALL_DIR|NAMESPACE|PVC_STORAGE_CLASS|NFS_STORAGE_CLASS|NFS_PV_NAME|REDIS_STORAGE_CLASS|REDIS_NFS_|OBSERVABILITY_NAMESPACE|GRAFANA_HOST)=' "${SYNC_REPO_DIR}/.env" 2>/dev/null || true

          echo
          echo "Sync complete."
          echo "No deployment was run by this workflow."
          echo "No Kubernetes, Helm, Ansible deployment, libvirt provisioning, or production mutation was run."
          echo "This workflow only refreshed the DEVtoPROD source tree on the dev/build server."
