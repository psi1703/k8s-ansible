apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-https
  namespace: observability
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`grafana.init-db.lan`)
      kind: Rule
      services:
        - name: kube-prometheus-stack-grafana
          port: 80
  # No per-IngressRoute TLS: uses Traefik websecure TLS/default certificate behavior.
  # In SCH production this uses the cluster-wide wildcard cert from Traefik's default tlsStore.
