# Helm values for kube-prometheus-stack
#
# This file is NOT a raw Kubernetes manifest.
# Install it with Helm, for example:
#
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace observability \
#     --create-namespace \
#     --version 85.0.1 \
#     -f k8s/observability/prometheus-stack-values.yaml
#
# Installs:
# - Prometheus
# - Alertmanager
# - Grafana
# - kube-state-metrics
# - node-exporter
#
# Namespace: observability
# Chart: prometheus-community/kube-prometheus-stack
# Version used with SCH setup: 85.0.1
#
# Target node placement:
# - observability/role=ui   -> worker intended for Grafana/Alertmanager
# - observability/role=data -> worker intended for Prometheus data
#
# Design reference:
# - SCH k8s observability design
# - SCH current k8s/observability/prometheus-stack-values.yaml

# kube-prometheus-stack default Grafana dashboards.
# These are top-level chart values, not grafana subchart values.
defaultDashboardsEnabled: true
defaultDashboardsEditable: true
defaultDashboardsTimezone: browser
forceDeployDashboards: true
forceDeployDatasources: true

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "9GiB"

    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m

    configReloaderResources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 50m

    nodeSelector:
      observability/role: data

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

    scrapeInterval: 15s
    evaluationInterval: 15s

    # Allow ServiceMonitors outside the Helm release labels,
    # including otp-relay and otp-monitor ServiceMonitors.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 20m
      limits:
        memory: 128Mi
        cpu: 100m

    configReloaderResources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 50m

    nodeSelector:
      observability/role: ui

grafana:
  enabled: true

  # SCH model: Grafana admin credentials are generated by the Helm chart
  # on first install and stored in a Kubernetes Secret in the observability
  # namespace. This avoids a first-install dependency on a pre-created
  # operator-owned secret.
  #
  # Retrieve the generated password with:
  #
  #   sudo k3s kubectl get secret kube-prometheus-stack-grafana \
  #     -n observability \
  #     -o jsonpath='{.data.admin-password}' | base64 -d; echo
  #
  # If your environment intentionally manages a stable admin secret such as
  # grafana-admin, set grafana.admin.existingSecret in a separate local override
  # values file rather than making it the repository default.

  ingress:
    enabled: false

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  readinessProbe:
    initialDelaySeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6

  initChownData:
    enabled: false

  deploymentStrategy:
    type: Recreate

  nodeSelector:
    observability/role: ui

  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 1Gi

  sidecar:
    # These sidecars load Grafana dashboard and datasource ConfigMaps.
    # Keep the limit above 64Mi; the previous 64Mi limit caused OOMKilled
    # restarts and prevented the default Kubernetes/Alertmanager dashboards
    # from being reliably imported.
    resources:
      requests:
        memory: 64Mi
        cpu: 10m
      limits:
        memory: 256Mi
        cpu: 100m

    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: observability
      folder: /tmp/dashboards
      provider:
        allowUiUpdates: true
        foldersFromFilesStructure: true

    datasources:
      enabled: true
      defaultDatasourceEnabled: true
      label: grafana_datasource
      labelValue: "1"
      searchNamespace: observability

  # SCH-aligned log datasource:
  # Loki gateway is disabled in loki-values.yaml, so Grafana must use
  # Loki's direct in-cluster service on port 3100.
  additionalDataSources:
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki.observability.svc.cluster.local:3100
      editable: true
      isDefault: false

kube-state-metrics:
  resources:
    requests:
      memory: 64Mi
      cpu: 20m
    limits:
      memory: 128Mi
      cpu: 100m

prometheus-node-exporter:
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 64Mi
      cpu: 50m

prometheusOperator:
  resources:
    requests:
      memory: 64Mi
      cpu: 20m
    limits:
      memory: 128Mi
      cpu: 100m

  # Resources for Prometheus Operator-managed config-reloader containers.
  # This covers the config-reloader and init-config-reloader sidecars that
  # are injected into Prometheus and Alertmanager pods.
  prometheusConfigReloader:
    resources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 50m

# K3s compatibility:
# K3s does not expose these as normal separate scrape targets.
# Keeping them enabled causes noisy false ScrapeFailure alerts.
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false
