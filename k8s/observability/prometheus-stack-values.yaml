# Helm values for kube-prometheus-stack
#
# This file is NOT a raw Kubernetes manifest.
# Install it with Helm, for example:
#
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace observability \
#     --create-namespace \
#     --version 85.0.1 \
#     -f k8s/observability/prometheus-stack-values.yaml
#
# Installs:
# - Prometheus
# - Alertmanager
# - Grafana
# - kube-state-metrics
# - node-exporter
#
# Namespace: observability
# Chart: prometheus-community/kube-prometheus-stack
# Version used with SCH setup: 85.0.1
#
# Target node placement:
# - observability/role=ui   -> worker intended for Grafana/Alertmanager
# - observability/role=data -> worker intended for Prometheus data

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "9GiB"

    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m

    # Resource controls for Prometheus config-reloader containers.
    # This covers the config-reloader sidecar and init config-reloader
    # rendered by the Prometheus Operator.
    configReloaderResources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 50m

    nodeSelector:
      observability/role: data

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

    scrapeInterval: 15s
    evaluationInterval: 15s

    # Allow ServiceMonitors outside the Helm release labels,
    # including otp-relay and otp-monitor ServiceMonitors.
    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

alertmanager:
  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 20m
      limits:
        memory: 128Mi
        cpu: 100m

    # Resource controls for Alertmanager config-reloader containers.
    # This covers the config-reloader sidecar and init config-reloader
    # rendered by the Prometheus Operator.
    configReloaderResources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 50m

    nodeSelector:
      observability/role: ui

grafana:
  ingress:
    enabled: false

  # Keep Grafana admin credentials stable across Helm upgrades.
  # This prevents new pods from failing because admin-password is missing
  # from the generated Grafana Secret.
  #
  # IMPORTANT:
  # - Change this password before final production handoff.
  # - If Grafana already has a persisted DB password, changing this value
  #   fixes the Kubernetes Secret for pod startup, but may not update the
  #   existing Grafana database password until reset once inside Grafana.
  adminUser: admin
  adminPassword: "ChangeMe-Grafana-Admin-2026!"

  # Dashboard is exposed by k8s/observability/grafana-ingressroute.yaml
  # after Grafana exists. The installer must not treat this values file as
  # enough to create Grafana by itself.

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  readinessProbe:
    initialDelaySeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6

  initChownData:
    enabled: false

  deploymentStrategy:
    type: Recreate

  nodeSelector:
    observability/role: ui

  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 1Gi

  sidecar:
    # Resource controls for Grafana dashboard/datasource sidecar containers.
    resources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 50m

    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: observability
      folder: /tmp/dashboards/OTP Relay
      provider:
        allowUiUpdates: true
        foldersFromFilesStructure: true
    datasources:
      enabled: true
      defaultDatasourceEnabled: true

kube-state-metrics:
  resources:
    requests:
      memory: 64Mi
      cpu: 20m
    limits:
      memory: 128Mi
      cpu: 100m

prometheus-node-exporter:
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 64Mi
      cpu: 50m

prometheusOperator:
  resources:
    requests:
      memory: 64Mi
      cpu: 20m
    limits:
      memory: 128Mi
      cpu: 100m

# K3s compatibility:
# K3s does not expose these as normal separate scrape targets.
# Keeping them enabled causes noisy false ScrapeFailure alerts.
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false
