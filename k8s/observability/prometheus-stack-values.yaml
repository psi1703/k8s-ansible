# Helm values for kube-prometheus-stack
#
# This file is NOT a raw Kubernetes manifest.
# Install it with Helm, for example:
#
#   helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
#   helm repo update
#   helm upgrade --install kube-prometheus-stack prometheus-community/kube-prometheus-stack \
#     --namespace observability \
#     --create-namespace \
#     --version 85.0.1 \
#     -f k8s/observability/prometheus-stack-values.yaml
#
# Installs:
# - Prometheus
# - Alertmanager
# - Grafana
# - kube-state-metrics
# - node-exporter
#
# Namespace: observability
# Chart: prometheus-community/kube-prometheus-stack
# Version used with SCH setup: 85.0.1
#
# Target node placement:
# - observability/role=ui   -> worker intended for Grafana/Alertmanager
# - observability/role=data -> worker intended for Prometheus data

prometheus:
  prometheusSpec:
    retention: 15d
    retentionSize: "9GiB"

    resources:
      requests:
        memory: 512Mi
        cpu: 200m
      limits:
        memory: 1Gi
        cpu: 500m

    configReloaderResources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 50m

    nodeSelector:
      observability/role: data

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: local-path
          accessModes:
            - ReadWriteOnce
          resources:
            requests:
              storage: 10Gi

    scrapeInterval: 15s
    evaluationInterval: 15s

    serviceMonitorSelectorNilUsesHelmValues: false
    podMonitorSelectorNilUsesHelmValues: false
    ruleSelectorNilUsesHelmValues: false
    probeSelectorNilUsesHelmValues: false

alertmanager:
  forceDeployDashboards: true

  alertmanagerSpec:
    resources:
      requests:
        memory: 64Mi
        cpu: 20m
      limits:
        memory: 128Mi
        cpu: 100m

    configReloaderResources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 50m

    nodeSelector:
      observability/role: ui

grafana:
  enabled: true

  # Force the kube-prometheus-stack default Kubernetes dashboards and
  # datasource ConfigMaps to be rendered even during chart changes.
  forceDeployDashboards: true
  forceDeployDatasources: true
  defaultDashboardsEnabled: true
  defaultDashboardsEditable: true
  defaultDashboardsTimezone: browser

  # Do not store the admin password in this repo.
  # Create this Secret once before Helm upgrade:
  # kubectl -n observability create secret generic grafana-admin \
  #   --from-literal=admin-user=admin \
  #   --from-literal=admin-password='YOUR_PASSWORD' \
  #   --dry-run=client -o yaml | kubectl apply -f -
  admin:
    existingSecret: grafana-admin
    userKey: admin-user
    passwordKey: admin-password

  ingress:
    enabled: false

  resources:
    requests:
      memory: 256Mi
      cpu: 100m
    limits:
      memory: 512Mi
      cpu: 500m

  readinessProbe:
    initialDelaySeconds: 30
    timeoutSeconds: 5
    failureThreshold: 6

  initChownData:
    enabled: false

  deploymentStrategy:
    type: Recreate

  nodeSelector:
    observability/role: ui

  persistence:
    enabled: true
    storageClassName: local-path
    accessModes:
      - ReadWriteOnce
    size: 1Gi

  sidecar:
    resources:
      requests:
        memory: 32Mi
        cpu: 10m
      limits:
        memory: 64Mi
        cpu: 50m

    dashboards:
      enabled: true
      label: grafana_dashboard
      labelValue: "1"
      searchNamespace: observability
      folder: /tmp/dashboards
      provider:
        allowUiUpdates: true
        foldersFromFilesStructure: true

    datasources:
      enabled: true
      defaultDatasourceEnabled: true

  additionalDataSources:
    - name: Loki
      uid: loki
      type: loki
      access: proxy
      url: http://loki.observability.svc.cluster.local:3100
      editable: true
      isDefault: false

kube-state-metrics:
  resources:
    requests:
      memory: 64Mi
      cpu: 20m
    limits:
      memory: 128Mi
      cpu: 100m

prometheus-node-exporter:
  resources:
    requests:
      memory: 32Mi
      cpu: 10m
    limits:
      memory: 64Mi
      cpu: 50m

prometheusOperator:
  resources:
    requests:
      memory: 64Mi
      cpu: 20m
    limits:
      memory: 128Mi
      cpu: 100m

# K3s compatibility:
# K3s does not expose these as normal separate scrape targets.
# Keeping them enabled causes noisy false ScrapeFailure alerts.
kubeControllerManager:
  enabled: false

kubeScheduler:
  enabled: false

kubeProxy:
  enabled: false

kubeEtcd:
  enabled: false
