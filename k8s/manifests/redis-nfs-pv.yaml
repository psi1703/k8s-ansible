apiVersion: v1
kind: PersistentVolume
metadata:
  name: otp-redis-0-nfs-pv
  labels:
    app: otp-redis
    redis-pod: otp-redis-0
    storage-role: redis-data
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: otp-redis-nfs
  claimRef:
    namespace: otp-relay
    name: redis-data-otp-redis-0
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: CHANGE_ME_NFS_SERVER
    path: CHANGE_ME_NFS_PATH/redis/otp-redis-0
---
