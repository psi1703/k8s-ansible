apiVersion: v1
kind: PersistentVolume
metadata:
  name: otp-relay-data-devprod-nfs-pv
  labels:
    app: otp-relay
    storage-role: otp-relay-data
spec:
  capacity:
    storage: 1Gi
  accessModes:
    - ReadWriteMany
  persistentVolumeReclaimPolicy: Retain
  storageClassName: otp-relay-devprod-nfs
  mountOptions:
    - nfsvers=4.1
  nfs:
    server: nfsdevprod.init-db.lan
    path: /srv/nfs/otp-relay-devprod
