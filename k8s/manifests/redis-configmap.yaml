apiVersion: v1
kind: ConfigMap
metadata:
  name: otp-redis-config
  namespace: otp-relay
data:
  redis-entrypoint.sh: |
    #!/bin/sh
    set -eu

    ordinal="${HOSTNAME##*-}"
    announce_host="${POD_NAME}.otp-redis-headless.otp-relay.svc.cluster.local"

    cat > /tmp/redis.conf <<EOF
    port 6379
    bind 0.0.0.0
    protected-mode no
    appendonly yes
    dir /data
    replica-announce-ip ${announce_host}
    replica-announce-port 6379
    EOF

    if [ "$ordinal" = "0" ]; then
      exec redis-server /tmp/redis.conf
    fi

    exec redis-server /tmp/redis.conf --replicaof otp-redis-0.otp-redis-headless.otp-relay.svc.cluster.local 6379
