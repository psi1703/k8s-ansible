---
# Keep deployment-specific values in the repository root .env file.
# The Ansible workflow runs the installer from INSTALL_DIR and passes the
# matching .env file to the control-plane deployment role.

cluster_name: otp-relay-devprod

k3s_disable_servicelb: true
k3s_disable_traefik: false

otp_namespace: "{{ lookup('env', 'NAMESPACE') | default('otp-relay', true) }}"
otp_install_dir: "{{ lookup('env', 'INSTALL_DIR') | default('/opt/k8s-ansible-DEVtoPROD', true) }}"
otp_env_file: "{{ otp_install_dir }}/.env"
otp_source_dir: "{{ otp_install_dir }}"
