---
# Keep deployment-specific values in the repository root .env file.
# The Ansible workflow copies the repo to the control-plane and runs the same
# installer, which loads .env and renders Kubernetes manifests from it.
cluster_name: otp-relay-prod

k3s_disable_servicelb: true
k3s_disable_traefik: false

otp_install_dir: /opt/k8s-ansible
otp_env_file: /opt/k8s-ansible/.env
