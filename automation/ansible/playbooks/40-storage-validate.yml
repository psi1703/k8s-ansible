---
# Disabled legacy Ansible playbook.
#
# Historical behavior:
#   This playbook validated live Kubernetes storage, PVCs, NFS-backed volumes,
#   and runtime cluster storage readiness.
#
# Current DEVtoPROD contract:
#   - The dev/build side creates a sealed production release bundle only.
#   - No live Kubernetes storage validation is allowed from this repository path.
#   - No PVC, pod, namespace, or storage class inspection is allowed from this path.
#   - No production server deployment or validation is allowed from this path.
#
# The production server receives only the finished release bundle.

- name: Disabled legacy Kubernetes storage validation
  hosts: localhost
  gather_facts: false
  connection: local

  tasks:
    - name: Refuse legacy storage validation
      ansible.builtin.fail:
        msg: >-
          Legacy live Kubernetes storage validation is disabled in the
          bundle-only DEVtoPROD architecture. Use bash setup.sh or
          bash build-release-bundle.sh to create a sealed production
          release bundle. Production-side storage validation must be
          performed only by the approved production procedure.
