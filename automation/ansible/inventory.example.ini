[control_plane]
localhost ansible_connection=local

[workers]
worker1 ansible_host=<worker-1-ip>
worker2 ansible_host=<worker-2-ip>

[k3s_cluster:children]
control_plane
workers

[all:vars]
ansible_python_interpreter=/usr/bin/python3

[workers:vars]
ansible_user=otp-relay
ansible_become=true
ansible_ssh_private_key_file=~/.ssh/otp-relay-cluster
