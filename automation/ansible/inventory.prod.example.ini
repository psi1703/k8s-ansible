# Disabled legacy production Ansible inventory example
#
# Runtime Ansible deployment is disabled in this branch.
#
# This file is retained only as a placeholder for tools or operators that still
# expect the legacy production inventory path to exist.
#
# Do not use this inventory to install K3s, configure production nodes, provision
# storage, deploy OTP Relay, validate production, run Helm, apply Kubernetes
# manifests, import images into a live cluster, or mutate infrastructure.
#
# Current DEVtoPROD contract:
#
#   1. Sync this repository to the dev/build server.
#   2. Build the sealed production release bundle from the repository root:
#
#        bash setup.sh
#
#   3. Transfer only the finished bundle, checksum, and report to production.
#
# Production receives only the finished sealed release bundle.
# Production-side installation or activation is outside this release builder.

[disabled_legacy_production_inventory]
# No hosts are defined intentionally.
