---
- name: Show cluster nodes
  ansible.builtin.command: k3s kubectl get nodes -o wide
  changed_when: false

- name: Show OTP Relay pods
  ansible.builtin.command: k3s kubectl get pods -n {{ otp_namespace | default('otp-relay') }} -o wide
  changed_when: false

- name: Show OTP Relay services and ingress
  ansible.builtin.command: k3s kubectl get svc,ingress -n {{ otp_namespace | default('otp-relay') }}
  changed_when: false
  failed_when: false

- name: Check app readiness endpoint from control-plane
  ansible.builtin.command: >
    k3s kubectl -n {{ otp_namespace | default('otp-relay') }} exec deploy/otp-relay
    -- python3 -c "import urllib.request; print(urllib.request.urlopen('http://127.0.0.1:8000/readyz', timeout=5).read().decode())"
  changed_when: false
  failed_when: false
