---
# Disabled legacy Ansible role tasks.
#
# Historical behavior:
#   This role validated a live Kubernetes deployment by inspecting pods,
#   services, ingress, storage, Redis, Grafana, rollout state, and runtime
#   application health.
#
# Current DEVtoPROD contract:
#   - The dev/build side creates a sealed production release bundle only.
#   - No live production validation is allowed from this repository path.
#   - No Kubernetes pod, service, ingress, PVC, Redis, Grafana, or rollout
#     inspection is allowed from this repository path.
#   - No live cluster dependency is allowed from this repository path.
#
# The production server receives only the finished release bundle.

- name: Refuse legacy production validation
  ansible.builtin.fail:
    msg: >-
      Legacy live production validation is disabled in the bundle-only
      DEVtoPROD architecture. Use bash setup.sh or bash build-release-bundle.sh
      to create a sealed production release bundle. Production-side validation
      must be performed only by the approved production procedure.
