---
# Bundle-only release policy:
#
# This role used to prepare Debian/Ubuntu hosts for direct Kubernetes cluster
# installation. That behavior is intentionally disabled.
#
# The DEVtoPROD path now builds a sealed production release bundle only.
# It must not install packages, disable swap, edit /etc/fstab, configure hosts,
# or mutate production infrastructure.

- name: Refuse legacy common host preparation role
  ansible.builtin.fail:
    msg: >-
      The automation/ansible/roles/common role is disabled by the bundle-only
      DEVtoPROD release policy. Do not prepare or mutate hosts from this
      repository. Build the sealed production release bundle on the dev/build
      host instead, then hand off only the finished bundle to production.
