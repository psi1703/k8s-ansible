---
- name: Install common headless packages
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - git
      - jq
      - openssl
      - python3
      - python3-venv
      - sudo
      - tar
      - gzip
      - iproute2
      - iptables
      - nftables
      - nfs-common
    state: present
    update_cache: true

- name: Disable swap for Kubernetes nodes when present
  ansible.builtin.command: swapoff -a
  changed_when: false
  failed_when: false
  when: inventory_hostname in groups['k3s_cluster']

- name: Remove active swap entries from fstab for Kubernetes nodes
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^(?!#)(.*\sswap\s.*)$'
    replace: '# \1'
  when: inventory_hostname in groups['k3s_cluster']
