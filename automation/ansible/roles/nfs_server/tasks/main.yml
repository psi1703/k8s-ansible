---
# Bundle-only release policy:
#
# This role used to install and configure an NFS server for the old direct
# deployment/provisioning flow. That behavior is intentionally disabled.
#
# The DEVtoPROD path now builds a sealed production release bundle only.
# It must not install nfs-kernel-server, create export directories, edit
# /etc/exports, reload exports, enable services, restart services, or mutate
# production/storage infrastructure.

- name: Refuse legacy NFS server role execution
  ansible.builtin.fail:
    msg: >-
      The automation/ansible/roles/nfs_server role is disabled by the
      bundle-only DEVtoPROD release policy. Do not install, configure, export,
      or restart NFS services from this repository. Build the sealed production
      release bundle on the dev/build host instead, then hand off only the
      finished bundle to production.
