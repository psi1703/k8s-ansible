---
# Disabled legacy Ansible role tasks.
#
# Historical behavior:
#   This role installed and configured K3s agent/worker nodes.
#
# Current DEVtoPROD contract:
#   - The dev/build side creates a sealed production release bundle only.
#   - No K3s agent installation is allowed from this repository path.
#   - No worker node mutation is allowed from this repository path.
#   - No production server deployment is allowed from this repository path.
#
# The production server receives only the finished release bundle.

- name: Refuse legacy K3s agent installation
  ansible.builtin.fail:
    msg: >-
      Legacy K3s agent/worker installation is disabled in the bundle-only
      DEVtoPROD architecture. Use bash setup.sh or
      bash build-release-bundle.sh to create a sealed production release
      bundle. Production-side installation must be performed only by the
      approved production procedure.
