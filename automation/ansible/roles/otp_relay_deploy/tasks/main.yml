---
# Disabled legacy Ansible role tasks.
#
# Historical behavior:
#   This role deployed OTP Relay into a live Kubernetes cluster by applying
#   manifests, importing/loading images, managing runtime objects, and checking
#   rollout state.
#
# Current DEVtoPROD contract:
#   - The dev/build side creates a sealed production release bundle only.
#   - No Kubernetes manifest apply is allowed from this repository path.
#   - No Helm execution is allowed from this repository path.
#   - No image import is allowed from this repository path.
#   - No rollout restart/status operation is allowed from this repository path.
#   - No live cluster mutation is allowed from this repository path.
#
# The production server receives only the finished release bundle.

- name: Refuse legacy OTP Relay Kubernetes deployment
  ansible.builtin.fail:
    msg: >-
      Legacy OTP Relay Kubernetes deployment is disabled in the bundle-only
      DEVtoPROD architecture. Use bash setup.sh or bash build-release-bundle.sh
      to create a sealed production release bundle. Production-side manifest
      application, image loading, Helm execution, rollout validation, secret
      handling, and operational checks must be performed only by the approved
      production procedure.
