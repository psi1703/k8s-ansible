---
- name: Ensure rsync is installed on control-plane
  ansible.builtin.apt:
    name: rsync
    state: present
    update_cache: true
  become: true

- name: Ensure OTP Relay install directory exists on control-plane
  ansible.builtin.file:
    path: "{{ otp_install_dir | default('/opt/k8s-ansible') }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Sync local k8s-ansible repo to control-plane
  ansible.posix.synchronize:
    src: /opt/k8s-ansible/
    dest: "{{ otp_install_dir | default('/opt/k8s-ansible') }}/"
    archive: true
    delete: true
    rsync_opts:
      - "--exclude=.git/"
      - "--exclude=.installer-venv/"
      - "--exclude=node_modules/"
      - "--exclude=automation/libvirt/build/"
      - "--exclude=automation/ansible/inventory.generated.ini"
  delegate_to: localhost

- name: Ensure required .env exists on control-plane
  ansible.builtin.stat:
    path: "{{ otp_env_file | default((otp_install_dir | default('/opt/k8s-ansible')) ~ '/.env') }}"
  register: otp_env_file_stat

- name: Stop when .env is missing
  ansible.builtin.fail:
    msg: >-
      Missing {{ otp_env_file | default((otp_install_dir | default('/opt/k8s-ansible')) ~ '/.env') }}.
      Create the installer .env first. It is the single source for runtime values.
  when: not otp_env_file_stat.stat.exists

- name: Ensure synced installer scripts are executable
  ansible.builtin.shell: |
    set -eu
    chmod +x "{{ otp_install_dir | default('/opt/k8s-ansible') }}/install-otp-relay-k8s.sh"
    find "{{ otp_install_dir | default('/opt/k8s-ansible') }}/scripts/lib" -type f -name '*.sh' -exec chmod +x {} \;
  args:
    executable: /bin/bash
  become: true

- name: Deploy OTP Relay through the project installer using .env source of truth
  ansible.builtin.shell: |
    set -euo pipefail

    install_dir="{{ otp_install_dir | default('/opt/k8s-ansible') }}"
    env_file="{{ otp_env_file | default((otp_install_dir | default('/opt/k8s-ansible')) ~ '/.env') }}"
    log_file="/tmp/otp-relay-installer-$(date +%Y%m%d-%H%M%S).log"

    cd "$install_dir"

    echo "[INFO] Starting OTP Relay installer on $(hostname)"
    echo "[INFO] Install directory: $install_dir"
    echo "[INFO] Env file: $env_file"
    echo "[INFO] Log file: $log_file"
    echo "[INFO] Long-running steps may include Docker builds, K3s checks, image import, kubectl apply, and rollout waits."
    echo "[INFO] To follow live progress on the control-plane, run:"
    echo "[INFO]   sudo tail -f $log_file"

    ENV_FILE="$env_file" \
    NONINTERACTIVE=1 \
    SKIP_REPO_SYNC=1 \
    GIT_CLEAN=0 \
    stdbuf -oL -eL bash install-otp-relay-k8s.sh 2>&1 | tee "$log_file"

    echo "[INFO] OTP Relay installer completed successfully"
  args:
    executable: /bin/bash
  become: true
