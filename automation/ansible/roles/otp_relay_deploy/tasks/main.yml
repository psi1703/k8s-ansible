---
- name: Define OTP Relay deployment paths
  ansible.builtin.set_fact:
    otp_relay_source_dir: "{{ otp_source_dir | default('/opt/k8s-ansible') }}"
    otp_relay_install_dir: "{{ otp_install_dir | default('/opt/k8s-ansible') }}"
    otp_relay_env_file: "{{ otp_env_file | default((otp_install_dir | default('/opt/k8s-ansible')) ~ '/.env') }}"
    otp_relay_installer_log: "/tmp/otp-relay-installer-current.log"
    otp_relay_installer_status_file: "/tmp/otp-relay-installer-current.status"

- name: Check if control-plane is local
  ansible.builtin.set_fact:
    otp_relay_control_plane_is_local: >-
      {{
        inventory_hostname in ['localhost', '127.0.0.1']
        or ansible_connection | default('ssh') == 'local'
      }}

- name: Ensure rsync is installed on control-plane when remote sync is needed
  ansible.builtin.apt:
    name: rsync
    state: present
    update_cache: true
  become: true
  when: not otp_relay_control_plane_is_local | bool

- name: Ensure OTP Relay install directory exists on control-plane
  ansible.builtin.file:
    path: "{{ otp_relay_install_dir }}"
    state: directory
    owner: "{{ ansible_user | default(ansible_env.SUDO_USER | default(ansible_env.USER | default('root'))) }}"
    group: "{{ ansible_user | default(ansible_env.SUDO_USER | default(ansible_env.USER | default('root'))) }}"
    mode: "0755"
  become: true

- name: Validate local source repo before release sync
  ansible.builtin.stat:
    path: "{{ otp_relay_source_dir }}/install-otp-relay-k8s.sh"
  delegate_to: localhost
  register: otp_relay_local_installer_stat
  when: not otp_relay_control_plane_is_local | bool

- name: Stop when local source repo is missing installer
  ansible.builtin.fail:
    msg: >-
      Missing {{ otp_relay_source_dir }}/install-otp-relay-k8s.sh on the Ansible runner.
      The dev-side k8s-ansible source directory is required before syncing to the control-plane.
  when:
    - not otp_relay_control_plane_is_local | bool
    - not otp_relay_local_installer_stat.stat.exists

- name: Sync approved k8s-ansible release files to remote control-plane
  ansible.posix.synchronize:
    src: "{{ otp_relay_source_dir }}/"
    dest: "{{ otp_relay_install_dir }}/"
    archive: true
    delete: true
    rsync_opts:
      # Safe top-level files.
      - "--include=/.env.example"
      - "--include=/.dockerignore"
      - "--include=/LICENSE"
      - "--include=/README.md"
      - "--include=/setup.sh"
      - "--include=/install-otp-relay-k8s.sh"
      - "--include=/main.py"
      - "--include=/monitor.py"
      - "--include=/requirements.txt"
      - "--include=/package.json"
      - "--include=/package-lock.json"

      # Safe deploy/app directories.
      - "--include=/automation/"
      - "--include=/automation/ansible/"
      - "--include=/automation/ansible/***"
      - "--include=/collections/***"
      - "--include=/docs/"
      - "--include=/docs/help/***"
      - "--include=/frontend/***"
      - "--include=/k8s/***"
      - "--include=/otp_monitor/***"
      - "--include=/otp_relay/***"
      - "--include=/scripts/***"

      # Explicitly protect secrets, runtime files, generated artifacts, and dev junk.
      - "--exclude=.git/"
      - "--exclude=.github/"
      - "--exclude=.installer-venv/"
      - "--exclude=.pytest_cache/"
      - "--exclude=.mypy_cache/"
      - "--exclude=.ruff_cache/"
      - "--exclude=__pycache__/"
      - "--exclude=node_modules/"
      - "--exclude=venv/"
      - "--exclude=.venv/"
      - "--exclude=release/"
      - "--exclude=automation/libvirt/build/"
      - "--exclude=automation/ansible/inventory.generated.ini"

      # Runtime configuration and secrets must stay operator-owned on prod.
      - "--exclude=.env"
      - "--exclude=.env.*"
      - "--exclude=secret.env"
      - "--exclude=users.xlsx"
      - "--exclude=admin_auth.json"
      - "--exclude=admin_config.json"
      - "--exclude=wizard_progress.json"
      - "--exclude=audit.log"
      - "--exclude=install-report.txt"
      - "--exclude=k3s.yaml"
      - "--exclude=kubeconfig"
      - "--exclude=*.kubeconfig"
      - "--exclude=*.pem"
      - "--exclude=*.key"
      - "--exclude=*.crt"

      # Build outputs and logs.
      - "--exclude=*.log"
      - "--exclude=*.tar"
      - "--exclude=*.tar.gz"
      - "--exclude=*.tgz"
      - "--exclude=*.zip"

      # Anything not explicitly included above stays out.
      - "--exclude=*"
  delegate_to: localhost
  when: not otp_relay_control_plane_is_local | bool

- name: Skip repo sync for localhost control-plane
  ansible.builtin.debug:
    msg: "Control-plane is localhost; using existing repository at {{ otp_relay_install_dir }} without rsync."
  when: otp_relay_control_plane_is_local | bool

- name: Ensure required .env exists on control-plane
  ansible.builtin.stat:
    path: "{{ otp_relay_env_file }}"
  register: otp_env_file_stat

- name: Stop when .env is missing
  ansible.builtin.fail:
    msg: >-
      Missing {{ otp_relay_env_file }}.
      Create the installer .env first. It is the single source for runtime values.
  when: not otp_env_file_stat.stat.exists

- name: Ensure installer scripts are executable
  ansible.builtin.shell: |
    set -eu

    chmod +x "{{ otp_relay_install_dir }}/install-otp-relay-k8s.sh"

    if [ -d "{{ otp_relay_install_dir }}/scripts/lib" ]; then
      find "{{ otp_relay_install_dir }}/scripts/lib" -type f -name '*.sh' -exec chmod +x {} \;
    fi
  args:
    executable: /bin/bash
  become: true
  changed_when: false

- name: Clear previous OTP Relay installer log and status
  ansible.builtin.file:
    path: "{{ item }}"
    state: absent
  become: true
  loop:
    - "{{ otp_relay_installer_log }}"
    - "{{ otp_relay_installer_status_file }}"

- name: Start OTP Relay installer asynchronously
  ansible.builtin.shell: |
    set -euo pipefail

    LOG="{{ otp_relay_installer_log }}"
    STATUS_FILE="{{ otp_relay_installer_status_file }}"
    INSTALL_DIR="{{ otp_relay_install_dir }}"
    ENV_SOURCE="{{ otp_relay_env_file }}"

    rm -f "$STATUS_FILE"

    {
      echo "[INFO] Starting OTP Relay installer on $(hostname)"
      echo "[INFO] Started at: $(date -Is)"
      echo "[INFO] Install dir: ${INSTALL_DIR}"
      echo "[INFO] Env file: ${ENV_SOURCE}"
      echo "[INFO] Control-plane mode: localhost/server"
      echo "[INFO] Long-running steps may include apt-get, Docker build, K3s checks, image import, kubectl apply, and rollout waits."
      echo "[INFO] Live log command: sudo tail -f ${LOG}"
      echo
    } > "$LOG"

    cd "$INSTALL_DIR"

    set +e
    ENV_FILE="$ENV_SOURCE" \
    NONINTERACTIVE=1 \
    SKIP_REPO_SYNC=1 \
    GIT_CLEAN=0 \
    stdbuf -oL -eL bash install-otp-relay-k8s.sh >> "$LOG" 2>&1
    rc="$?"
    set -e

    {
      echo
      echo "[INFO] OTP Relay installer finished at: $(date -Is)"
      echo "[INFO] OTP Relay installer rc=${rc}"
    } >> "$LOG"

    printf '%s\n' "$rc" > "$STATUS_FILE"
    exit "$rc"
  args:
    executable: /bin/bash
  become: true
  async: 7200
  poll: 0
  register: otp_relay_installer_job

- name: Show OTP Relay installer live-log command
  ansible.builtin.debug:
    msg:
      - "OTP Relay installer started asynchronously."
      - "Installer job id: {{ otp_relay_installer_job.ansible_job_id }}"
      - "Live log on control-plane:"
      - "sudo tail -f {{ otp_relay_installer_log }}"
      - "Status file:"
      - "{{ otp_relay_installer_status_file }}"

- name: Wait briefly before first installer log snapshot
  ansible.builtin.pause:
    seconds: 15

- name: Print initial installer log snapshot
  ansible.builtin.shell: |
    set -eu

    echo "===== installer job id: {{ otp_relay_installer_job.ansible_job_id }} ====="
    echo
    echo "===== live log command ====="
    echo "sudo tail -f {{ otp_relay_installer_log }}"
    echo
    echo "===== recent installer log ====="

    if [ -f "{{ otp_relay_installer_log }}" ]; then
      tail -100 "{{ otp_relay_installer_log }}"
    else
      echo "installer log not created yet: {{ otp_relay_installer_log }}"
    fi
  args:
    executable: /bin/bash
  become: true
  changed_when: false
  failed_when: false

- name: Wait for OTP Relay installer to finish
  ansible.builtin.async_status:
    jid: "{{ otp_relay_installer_job.ansible_job_id }}"
  register: otp_relay_installer_status
  until: otp_relay_installer_status.finished | default(false)
  retries: 720
  delay: 10
  become: true
  changed_when: false
  failed_when: false

- name: Read OTP Relay installer status file
  ansible.builtin.shell: |
    set -eu

    if [ -f "{{ otp_relay_installer_status_file }}" ]; then
      cat "{{ otp_relay_installer_status_file }}"
    else
      echo "missing"
    fi
  args:
    executable: /bin/bash
  become: true
  register: otp_relay_installer_status_file_result
  changed_when: false
  failed_when: false

- name: Show final OTP Relay installer log
  ansible.builtin.shell: |
    set -eu

    echo "===== installer status ====="
    echo "async finished={{ otp_relay_installer_status.finished | default('unknown') }}"
    echo "async rc={{ otp_relay_installer_status.rc | default('unknown') }}"
    echo "status file rc={{ otp_relay_installer_status_file_result.stdout | default('unknown') }}"
    echo
    echo "===== final installer log tail ====="

    if [ -f "{{ otp_relay_installer_log }}" ]; then
      tail -260 "{{ otp_relay_installer_log }}"
    else
      echo "installer log missing: {{ otp_relay_installer_log }}"
    fi
  args:
    executable: /bin/bash
  become: true
  changed_when: false
  failed_when: false

- name: Fail when OTP Relay installer failed
  ansible.builtin.fail:
    msg: >-
      OTP Relay installer failed with rc={{ otp_relay_installer_status.rc | default(otp_relay_installer_status_file_result.stdout | default('unknown')) }}.
      Review the control-plane log: {{ otp_relay_installer_log }}
      Live command: sudo tail -f {{ otp_relay_installer_log }}
  when: >
    (otp_relay_installer_status.rc | default(0) | int) != 0
    or
    (
      otp_relay_installer_status_file_result.stdout is defined
      and otp_relay_installer_status_file_result.stdout not in ['0', 'missing']
      and (otp_relay_installer_status_file_result.stdout | int) != 0
    )
