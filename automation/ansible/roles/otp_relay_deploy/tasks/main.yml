---
- name: Ensure rsync is installed on control-plane
  ansible.builtin.apt:
    name: rsync
    state: present
    update_cache: true
  become: true

- name: Ensure OTP Relay install directory exists on control-plane
  ansible.builtin.file:
    path: "{{ otp_install_dir | default('/opt/k8s-ansible') }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: "0755"
  become: true

- name: Sync local k8s-ansible repo to control-plane
  ansible.posix.synchronize:
    src: /opt/k8s-ansible/
    dest: "{{ otp_install_dir | default('/opt/k8s-ansible') }}/"
    archive: true
    delete: true
    rsync_opts:
      - "--exclude=.git/"
      - "--exclude=.installer-venv/"
      - "--exclude=node_modules/"
      - "--exclude=automation/libvirt/build/"
      - "--exclude=automation/ansible/inventory.generated.ini"
  delegate_to: localhost

- name: Ensure required .env exists on control-plane
  ansible.builtin.stat:
    path: "{{ otp_env_file | default((otp_install_dir | default('/opt/k8s-ansible')) ~ '/.env') }}"
  register: otp_env_file_stat

- name: Stop when .env is missing
  ansible.builtin.fail:
    msg: >-
      Missing {{ otp_env_file | default((otp_install_dir | default('/opt/k8s-ansible')) ~ '/.env') }}.
      Create the installer .env first. It is the single source for runtime values.
  when: not otp_env_file_stat.stat.exists

- name: Ensure synced installer scripts are executable
  ansible.builtin.shell: |
    set -eu
    chmod +x "{{ otp_install_dir | default('/opt/k8s-ansible') }}/install-otp-relay-k8s.sh"
    find "{{ otp_install_dir | default('/opt/k8s-ansible') }}/scripts/lib" -type f -name '*.sh' -exec chmod +x {} \;
  args:
    executable: /bin/bash
  become: true

- name: Define OTP Relay installer paths
  ansible.builtin.set_fact:
    otp_relay_install_dir: "{{ otp_install_dir | default('/opt/k8s-ansible') }}"
    otp_relay_env_file: "{{ otp_env_file | default((otp_install_dir | default('/opt/k8s-ansible')) ~ '/.env') }}"
    otp_relay_installer_log: "/tmp/otp-relay-installer-current.log"

- name: Clear previous OTP Relay installer log
  ansible.builtin.file:
    path: "{{ otp_relay_installer_log }}"
    state: absent
  become: true

- name: Start OTP Relay installer in background
  ansible.builtin.shell: |
    LOG="{{ otp_relay_installer_log }}"
    echo "[INFO] Starting OTP Relay installer on $(hostname)" > "$LOG"
    echo "[INFO] Started at: $(date -Is)" >> "$LOG"
    echo "[INFO] Install dir: {{ otp_relay_install_dir }}" >> "$LOG"
    echo "[INFO] Env file: {{ otp_relay_env_file }}" >> "$LOG"
    echo >> "$LOG"
    cd "{{ otp_relay_install_dir }}"
    export ENV_FILE="{{ otp_relay_env_file }}"
    export NONINTERACTIVE=1
    export SKIP_REPO_SYNC=1
    export GIT_CLEAN=0
    bash install-otp-relay-k8s.sh >> "$LOG" 2>&1
  args:
    executable: /bin/bash
  become: true
  async: 7200
  poll: 0
  register: otp_relay_installer_job

- name: Show OTP Relay installer live-log command
  ansible.builtin.debug:
    msg:
      - "OTP Relay installer started asynchronously."
      - "Live log on control-plane:"
      - "sudo tail -f {{ otp_relay_installer_log }}"

- name: Wait briefly then snapshot installer log
  ansible.builtin.pause:
    seconds: 15

- name: Print recent installer log output
  ansible.builtin.shell: |
    set -eu
    echo "===== installer job id: {{ otp_relay_installer_job.ansible_job_id }} ====="
    echo
    echo "===== recent installer log ====="
    if [ -f "{{ otp_relay_installer_log }}" ]; then
      tail -40 "{{ otp_relay_installer_log }}"
    else
      echo "installer log not created yet: {{ otp_relay_installer_log }}"
    fi
  args:
    executable: /bin/bash
  become: true
  changed_when: false
  failed_when: false

- name: Wait for OTP Relay installer to finish
  ansible.builtin.async_status:
    jid: "{{ otp_relay_installer_job.ansible_job_id }}"
  register: otp_relay_installer_status
  until: otp_relay_installer_status.finished
  retries: 720
  delay: 10
  become: true

- name: Show final OTP Relay installer log
  ansible.builtin.shell: |
    set -eu
    echo "===== final installer log tail ====="
    tail -160 "{{ otp_relay_installer_log }}" || true
  args:
    executable: /bin/bash
  become: true
  changed_when: false

- name: Fail when OTP Relay installer failed
  ansible.builtin.fail:
    msg: >-
      OTP Relay installer failed with rc={{ otp_relay_installer_status.rc | default('unknown') }}.
      Review the control-plane log: {{ otp_relay_installer_log }}
  when: otp_relay_installer_status.rc | default(0) != 0
